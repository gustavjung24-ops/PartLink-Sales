name: Build Windows (Portable + NSIS) - Partling-sale

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install deps (root)
        run: pnpm install --frozen-lockfile

      - name: Build shared/packages first
        run: pnpm -r --workspace-concurrency=1 --filter "./packages/**" build

      - name: Install native module prebuilds (desktop)
        working-directory: apps/desktop
        run: npx electron-builder install-app-deps

      - name: Build desktop (renderer/main)
        working-directory: apps/desktop
        env:
          VITE_LICENSE_WEBAPP_URL: ${{ vars.LICENSE_WEBAPP_URL || secrets.LICENSE_WEBAPP_URL }}
          VITE_LICENSE_API_KEY: ${{ secrets.LICENSE_API_KEY }}
        run: pnpm build

      - name: Package – Portable
        working-directory: apps/desktop
        run: pnpm run package:portable

      - name: Package – NSIS
        working-directory: apps/desktop
        run: pnpm run package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Partling-sale-Windows
          path: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.zip
