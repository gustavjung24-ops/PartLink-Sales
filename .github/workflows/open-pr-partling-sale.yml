name: Open PR – Partling‑sale WebApp Licensing
on: { workflow_dispatch: {} }
permissions: { contents: write, pull-requests: write }
jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply patch (commit all planned files)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p apps/desktop/src/main/services apps/desktop/src/main/ipc apps/desktop/src/renderer/screens/LicenseActivation .github/workflows apps/desktop
          cat > apps/desktop/electron-builder.json <<'EOF'
          {
            "appId": "com.partling.sale",
            "productName": "Partling-sale",
            "asar": true,
            "files": ["dist/**", "node_modules/**", "resources/**", "package.json"],
            "asarUnpack": ["**/better-sqlite3/**"],
            "extraResources": [{ "from": "resources/", "to": "resources", "filter": ["**/*"] }],
            "win": { "target": ["portable", "nsis"], "artifactName": "Partling-sale-${version}-${arch}.${ext}" },
            "nsis": { "oneClick": true, "perMachine": false, "allowElevation": true, "createDesktopShortcut": true, "createStartMenuShortcut": true }
          }
          EOF
          cat > apps/desktop/.env.example <<'EOF'
          VITE_LICENSE_WEBAPP_URL=${{ vars.LICENSE_WEBAPP_URL || secrets.LICENSE_WEBAPP_URL }}
          VITE_LICENSE_API_KEY=__DEV_ONLY__
          EOF
          cat > apps/desktop/.env.production <<'EOF'
          VITE_LICENSE_WEBAPP_URL=
          VITE_LICENSE_API_KEY=
          EOF
          cat > apps/desktop/src/main/services/fingerprint.ts <<'EOF'
          import { machineId } from "node-machine-id";
          import { createHash } from "crypto";
          let cached: string | null = null;
          export async function getHashedMachineId(): Promise<string> {
            if (cached) return cached;
            const id = await machineId();
            cached = createHash("sha256").update(id).digest("hex");
            return cached;
          }
          EOF
          cat > apps/desktop/src/main/services/licenseWebApp.ts <<'EOF'
          const WEBAPP_URL = (process.env.VITE_LICENSE_WEBAPP_URL as string) || process.env.LICENSE_WEBAPP_URL;
          const API_KEY   = (process.env.VITE_LICENSE_API_KEY as string)   || process.env.LICENSE_API_KEY;
          type Status = "OK"|"ACTIVE"|"INVALID"|"BOUND_OTHER"|"ERROR";
          export interface WebAppResp { ok: boolean; status: Status; message?: string; data?: any; }
          async function callWebApp(action: "check"|"activate", payload: Record<string,any>): Promise<WebAppResp> {
            if (!WEBAPP_URL) throw new Error("LICENSE_WEBAPP_URL not set");
            const c = new AbortController(); const t = setTimeout(()=>c.abort(), 8000);
            try {
              const res = await fetch(`${WEBAPP_URL}?action=${encodeURIComponent(action)}`, {
                method: "POST",
                headers: { "Content-Type":"application/json", ...(API_KEY?{ "X-Api-Key": API_KEY }: {}) },
                body: JSON.stringify(payload),
                signal: c.signal as any
              });
              const txt = await res.text();
              try { return JSON.parse(txt); } catch { return { ok: res.ok, status: res.ok?"OK":"ERROR", message: txt }; }
            } finally { clearTimeout(t); }
          }
          export function checkLicense(licenseKey: string, softwareName: string) { return callWebApp("check", { licenseKey, softwareName }); }
          export function activateLicense(licenseKey: string, machineId: string, softwareName: string, customer?: string, phone?: string) {
            return callWebApp("activate", { licenseKey, machineId, softwareName, customer, phone });
          }
          EOF
          cat > apps/desktop/src/main/ipc/licenseIpc.ts <<'EOF'
          import { ipcMain, app } from "electron";
          import { getHashedMachineId } from "../services/fingerprint";
          import { checkLicense, activateLicense } from "../services/licenseWebApp";
          ipcMain.handle("license:check", async (_e, licenseKey: string) => {
            const softwareName = app.getName() || "Partling-sale";
            return checkLicense(licenseKey, softwareName);
          });
          ipcMain.handle("license:activate", async (_e, p: { licenseKey: string; customer?: string; phone?: string }) => {
            const softwareName = app.getName() || "Partling-sale";
            const machineId = await getHashedMachineId();
            return activateLicense(p.licenseKey, machineId, softwareName, p.customer, p.phone);
          });
          EOF
          if [ -f apps/desktop/src/main/index.ts ]; then
            grep -q 'app.setName("Partling-sale")' apps/desktop/src/main/index.ts || \
              sed -i '1 i\\import { app } from "electron";\napp.setName("Partling-sale");\nimport "./ipc/licenseIpc";' apps/desktop/src/main/index.ts
          else
            mkdir -p apps/desktop/src/main
            cat > apps/desktop/src/main/index.ts <<'EOF'
            import { app, BrowserWindow } from "electron";
            app.setName("Partling-sale");
            import "./ipc/licenseIpc";
            let win: BrowserWindow | null = null;
            app.whenReady().then(()=>{ win = new BrowserWindow({ webPreferences:{ preload: __dirname + "/../preload/index.js" }});
              win.loadURL(process.env.ELECTRON_RENDERER_URL || "file://" + __dirname + "/../renderer/index.html"); });
            EOF
          fi
          mkdir -p apps/desktop/src/preload
          if [ -f apps/desktop/src/preload/index.ts ]; then
            grep -q 'license:' apps/desktop/src/preload/index.ts || cat >> apps/desktop/src/preload/index.ts <<'EOF'

            import { contextBridge, ipcRenderer } from "electron";
            contextBridge.exposeInMainWorld("license", {
              check: (k: string) => ipcRenderer.invoke("license:check", k),
              activate: (k: string, c?: string, p?: string) => ipcRenderer.invoke("license:activate", { licenseKey: k, customer: c, phone: p })
            });
            EOF
          else
            cat > apps/desktop/src/preload/index.ts <<'EOF'
            import { contextBridge, ipcRenderer } from "electron";
            contextBridge.exposeInMainWorld("license", {
              check: (k: string) => ipcRenderer.invoke("license:check", k),
              activate: (k: string, c?: string, p?: string) => ipcRenderer.invoke("license:activate", { licenseKey: k, customer: c, phone: p })
            });
            EOF
          fi
          cat > apps/desktop/src/renderer/screens/LicenseActivation/Activate.tsx <<'EOF'
          import { useState } from "react";
          declare global { interface Window { license: {
            check(k: string): Promise<{ ok: boolean; status: string; message?: string }>;
            activate(k: string, c?: string, p?: string): Promise<{ ok: boolean; status: string; message?: string }>;
          } } }
          export default function Activate() {
            const [key, setKey] = useState(""); const [customer, setCustomer] = useState("");
            const [phone, setPhone] = useState(""); const [msg, setMsg] = useState("");
            const onCheck = async () => { const r = await window.license.check(key.trim()); setMsg(`${r.status}${r.message?`: ${r.message}`:""}`); };
            const onActivate = async () => { const r = await window.license.activate(key.trim(), customer.trim()||undefined, phone.trim()||undefined);
              setMsg(`${r.status}${r.message?`: ${r.message}`:""}`); };
            return (<div className="space-y-3"><h2 className="text-lg font-semibold">Kích hoạt bản quyền</h2>
              <input placeholder="Mã Kích Hoạt" value={key} onChange={e=>setKey(e.target.value)} />
              <input placeholder="Khách hàng (tùy chọn)" value={customer} onChange={e=>setCustomer(e.target.value)} />
              <input placeholder="SĐT (tùy chọn)" value={phone} onChange={e=>setPhone(e.target.value)} />
              <div className="flex gap-2"><button onClick={onCheck}>Kiểm tra</button><button onClick={onActivate}>Kích hoạt</button></div>
              {msg && <div>{msg}</div>}</div>); }
          EOF
          cat > .github/workflows/build-windows.yml <<'EOF'
          name: Build Windows (Portable + NSIS) - Partling-sale
          on: { workflow_dispatch: {}, push: { branches: [ "main" ] } }
          jobs:
            build:
              runs-on: windows-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with: { node-version: 20 }
                - name: Enable corepack (pnpm)
                  run: corepack enable
                - name: Install deps
                  run: pnpm install --frozen-lockfile
                - name: Build (renderer/main)
                  working-directory: apps/desktop
                  env:
                    VITE_LICENSE_WEBAPP_URL: ${{ vars.LICENSE_WEBAPP_URL || secrets.LICENSE_WEBAPP_URL }}
                    VITE_LICENSE_API_KEY: ${{ secrets.LICENSE_API_KEY }}
                  run: pnpm build
                - name: Package Portable
                  working-directory: apps/desktop
                  run: npx electron-builder --win portable
                - name: Package NSIS
                  working-directory: apps/desktop
                  run: npx electron-builder --win nsis
                - name: Upload artifacts
                  uses: actions/upload-artifact@v4
                  with:
                    name: Partling-sale-Windows
                    path: |
                      apps/desktop/dist/*.exe
                      apps/desktop/dist/*.zip
          EOF

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "feat(licensing): Apps Script WebApp licensing + Windows Portable/NSIS (Partling-sale)"
          title: "feat(licensing): Apps Script WebApp licensing + Windows Portable/NSIS (Partling-sale)"
          body: |
            - Desktop calls Google Apps Script Web App directly (no SA JSON, no backend)
            - Sends X-Api-Key from CI secret with each request
            - Machine ID hashed (SHA-256) and recorded on activation
            - Packaging: Portable + NSIS named “Partling-sale”
            - CI workflow builds and uploads both artifacts
          branch: feat/partling-sale-webapp-licensing
          base: main
